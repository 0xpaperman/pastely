<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pastely — share text instantly</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <a href="index.html" class="logo">pastely<span class="dot">.</span></a>
    <p class="tagline">drop text. share a link.</p>
  </header>

  <main>
    <!-- Create paste -->
    <div class="card">
      <textarea id="textInput" placeholder="Paste or type anything here…" spellcheck="false"></textarea>
      <div class="actions">
        <span id="charCount">0 chars</span>
        <button id="shareBtn">Share →</button>
      </div>
    </div>

    <!-- All pastes -->
    <section class="pastes-section">
      <p class="section-label">Recent pastes</p>
      <div id="pasteList" class="paste-list">
        <p class="loading">Loading…</p>
      </div>
    </section>
  </main>

  <footer>built with plain HTML — no frameworks harmed</footer>

  <script>
    const API = 'https://uor92nqx9c.execute-api.ap-southeast-2.amazonaws.com/dev';

    const textarea = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const shareBtn = document.getElementById('shareBtn');
    const pasteList = document.getElementById('pasteList');

    // Char counter
    textarea.addEventListener('input', () => {
      const len = textarea.value.length;
      charCount.textContent = len === 1 ? '1 char' : `${len.toLocaleString()} chars`;
    });

    // Create paste
    shareBtn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      if (!text) { textarea.focus(); return; }

      shareBtn.textContent = 'Sharing…';
      shareBtn.disabled = true;

      try {
        const res = await fetch(`${API}/paste`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        window.location.href = `paste.html?id=${data.id}`;
      } catch (e) {
        shareBtn.textContent = 'Error — try again';
        shareBtn.disabled = false;
      }
    });

    // Load all pastes
    async function loadPastes() {
      try {
        const res = await fetch(`${API}/pastes`);
        const data = await res.json();
        const pastes = data.pastes;

        if (!pastes || pastes.length === 0) {
          pasteList.innerHTML = '<p class="empty">No pastes yet. Be the first!</p>';
          return;
        }

        pastes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        pasteList.innerHTML = pastes.map(p => `
          <a href="paste.html?id=${p.id}" class="paste-item">
            <span class="paste-preview">${escapeHtml(p.text.slice(0, 80))}${p.text.length > 80 ? '…' : ''}</span>
            <span class="paste-date">${formatDate(p.createdAt)}</span>
          </a>
        `).join('');
      } catch (e) {
        pasteList.innerHTML = '<p class="empty">Could not load pastes.</p>';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    loadPastes();
  </script>
</body>
</html>
